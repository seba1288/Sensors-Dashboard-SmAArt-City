{% extends "base.html" %}

{% block title %}Applications - IoT Sensor Platform{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h1>LoRaWAN Applications</h1>
    </div>
</div>

<div class="row">
    <div class="col-12">
        <div class="list-group">
            {% for app_id, sensors in apps.items() %}
            <a href="{{ url_for('applications.view_application', app_id=app_id) }}" class="list-group-item list-group-item-action">
                <strong>{{ app_id }}</strong>
                <span class="badge bg-secondary float-end">{{ sensors|length }} sensors</span>
            </a>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
