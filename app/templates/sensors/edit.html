{% extends "base.html" %}

{% block title %}Edit Sensor - IoT Sensor Platform{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <h1>Edit Sensor</h1>
        
        <div class="card mt-4">
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="unique_id" class="form-label">Unique ID</label>
                            <input type="text" class="form-control" value="{{ sensor.unique_id }}" disabled>
                            <small class="text-muted">Cannot be changed</small>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="name" class="form-label">Sensor Name *</label>
                            <input type="text" class="form-control" id="name" name="name" value="{{ sensor.name }}" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="sensor_type" class="form-label">Sensor Type *</label>
                            <select class="form-control" id="sensor_type" name="sensor_type" required>
                                <option value="">Select Type</option>
                                <option value="environmental" {% if sensor.sensor_type == 'environmental' %}selected{% endif %}>Environmental</option>
                                <option value="parking" {% if sensor.sensor_type == 'parking' %}selected{% endif %}>Parking</option>
                                <option value="weather" {% if sensor.sensor_type == 'weather' %}selected{% endif %}>Weather</option>
                                <option value="air_quality" {% if sensor.sensor_type == 'air_quality' %}selected{% endif %}>Air Quality</option>
                                <option value="other" {% if sensor.sensor_type == 'other' %}selected{% endif %}>Other</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="location" class="form-label">Location *</label>
                            <input type="text" class="form-control" id="location" name="location" value="{{ sensor.location }}" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="latitude" class="form-label">Latitude</label>
                            <input type="number" class="form-control" id="latitude" name="latitude" step="0.0001" value="{{ sensor.latitude or '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="longitude" class="form-label">Longitude</label>
                            <input type="number" class="form-control" id="longitude" name="longitude" step="0.0001" value="{{ sensor.longitude or '' }}">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="battery_type" class="form-label">Battery Type</label>
                            <input type="text" class="form-control" id="battery_type" name="battery_type" value="{{ sensor.battery_type or '' }}">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="battery_voltage_min" class="form-label">Battery Voltage Min (V)</label>
                            <input type="number" class="form-control" id="battery_voltage_min" name="battery_voltage_min" step="0.1" value="{{ sensor.battery_voltage_min or '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="battery_voltage_max" class="form-label">Battery Voltage Max (V)</label>
                            <input type="number" class="form-control" id="battery_voltage_max" name="battery_voltage_max" step="0.1" value="{{ sensor.battery_voltage_max or '' }}">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="notes" class="form-label">Notes</label>
                        <textarea class="form-control" id="notes" name="notes" rows="3">{{ sensor.notes or '' }}</textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <a href="{{ url_for('sensors.view_sensor', sensor_id=sensor.id) }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
