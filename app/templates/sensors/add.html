{% extends "base.html" %}

{% block title %}Add Sensor - IoT Sensor Platform{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <h1>Add New Sensor</h1>
        
        <div class="card mt-4">
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="unique_id" class="form-label">Unique ID *</label>
                            <input type="text" class="form-control" id="unique_id" name="unique_id" required placeholder="e.g., env_001">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="name" class="form-label">Sensor Name *</label>
                            <input type="text" class="form-control" id="name" name="name" required placeholder="e.g., Temperature Sensor - City Center">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="sensor_type" class="form-label">Sensor Type *</label>
                            <select class="form-control" id="sensor_type" name="sensor_type" required>
                                <option value="">Select Type</option>
                                <option value="environmental">Environmental</option>
                                <option value="parking">Parking</option>
                                <option value="weather">Weather</option>
                                <option value="air_quality">Air Quality</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="location" class="form-label">Location *</label>
                            <input type="text" class="form-control" id="location" name="location" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="latitude" class="form-label">Latitude</label>
                            <input type="number" class="form-control" id="latitude" name="latitude" step="0.0001" placeholder="48.8400">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="longitude" class="form-label">Longitude</label>
                            <input type="number" class="form-control" id="longitude" name="longitude" step="0.0001" placeholder="10.0000">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="lorawan_dev_eui" class="form-label">LoRaWAN Dev EUI</label>
                            <input type="text" class="form-control" id="lorawan_dev_eui" name="lorawan_dev_eui" placeholder="e.g., A81234000000001">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="battery_type" class="form-label">Battery Type</label>
                            <input type="text" class="form-control" id="battery_type" name="battery_type" placeholder="e.g., AA 2000mAh">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="battery_voltage_min" class="form-label">Battery Voltage Min (V)</label>
                            <input type="number" class="form-control" id="battery_voltage_min" name="battery_voltage_min" step="0.1" placeholder="0.9">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="battery_voltage_max" class="form-label">Battery Voltage Max (V)</label>
                            <input type="number" class="form-control" id="battery_voltage_max" name="battery_voltage_max" step="0.1" placeholder="1.5">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="notes" class="form-label">Notes</label>
                        <textarea class="form-control" id="notes" name="notes" rows="3"></textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Add Sensor</button>
                        <a href="{{ url_for('sensors.list_sensors') }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
