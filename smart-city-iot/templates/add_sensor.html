{% extends "base.html" %}

{% block content %}
<h1>Add New Sensor</h1>

<form action="{{ url_for('main.add_sensor') }}" method="POST" class="form-container">
    <div class="form-group">
        <label for="id">Sensor ID (Device EUI):</label>
        <input type="text" id="id" name="id" required>
    </div>
    
    <div class="form-group">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>
    </div>
    
    <div class="form-group">
        <label for="type">Type (e.g., Environment, Parking):</label>
        <input type="text" id="type" name="type" required>
    </div>
    
    <div class="form-group">
        <label for="location">Location:</label>
        <input type="text" id="location" name="location">
    </div>
    
    <button type="submit" class="btn">Add Sensor</button>
</form>
{% endblock %}
