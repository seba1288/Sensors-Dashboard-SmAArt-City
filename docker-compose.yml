version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: iot-postgres
    environment:
      POSTGRES_DB: iot_sensors
      POSTGRES_USER: iot_user
      POSTGRES_PASSWORD: secure_password_change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - iot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iot_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Flask Application
  app:
    build: .
    container_name: iot-app
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DATABASE_URL: postgresql://iot_user:secure_password_change_me@postgres:5432/iot_sensors
      MQTT_BROKER: ${MQTT_BROKER:-au1.cloud.thethings.industries}
      MQTT_PORT: ${MQTT_PORT:-8883}
      MQTT_USERNAME: ${MQTT_USERNAME:-your-app@ttn}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-your-api-key}
      API_ENDPOINT: http://localhost:5000/api/sensor-data/ingest
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./ingestion_worker:/app/ingestion_worker
    networks:
      - iot-network
    restart: unless-stopped

  # MQTT Ingestion Worker
  mqtt-worker:
    build: .
    container_name: iot-mqtt-worker
    environment:
      MQTT_BROKER: ${MQTT_BROKER:-au1.cloud.thethings.industries}
      MQTT_PORT: ${MQTT_PORT:-8883}
      MQTT_USERNAME: ${MQTT_USERNAME:-your-app@ttn}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-your-api-key}
      API_ENDPOINT: http://app:5000/api/sensor-data/ingest
    depends_on:
      - app
    networks:
      - iot-network
    restart: unless-stopped
    command: python -m ingestion_worker.mqtt_client

  # pgAdmin for Database Management (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: iot-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - iot-network
    restart: unless-stopped

networks:
  iot-network:
    driver: bridge

volumes:
  postgres_data:
